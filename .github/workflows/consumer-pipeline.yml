name: Consumer Contract Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  contract-test:
    runs-on: windows-latest  # Runs in GitHub cloud
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --no-restore --configuration Release
    
    - name: Run Contract Tests
      run: dotnet test tests/UserApiConsumer.Tests.csproj --no-build --configuration Release --verbosity normal
    
    # Publishing to broker skipped - Pact Broker not accessible from GitHub cloud runners
    # To publish manually from your local machine:
    # $version = "YOUR_VERSION"
    # curl.exe -X PUT -H "Content-Type: application/json" -d "@pacts\UserApiConsumer-UserApiProvider.json" "http://puvsfpactserver.tiger01-dev.ba.lab.local:9292/pacts/provider/UserApiProvider/consumer/UserApiConsumer/version/$version"
    
    - name: Upload Pact Files as Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pact-files
        path: pacts/*.json
